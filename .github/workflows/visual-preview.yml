name: Visual Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  visual-preview:
    name: Generate Visual Preview
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build mdwow
        run: npm run build

      - name: Install VHS and Dependencies
        run: |
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://repo.charm.sh/apt/gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" | sudo tee /etc/apt/sources.list.d/charm.list
          sudo apt-get update
          sudo apt-get install -y vhs ttyd ffmpeg

      - name: Create screenshots directory
        run: mkdir -p tests/ui/screenshots

      - name: Generate Screenshots with VHS
        run: vhs tests/ui/preview.tape
        env:
          FORCE_COLOR: 3

      - name: Upload Main Screenshot
        id: imgur_main
        uses: devicons/public-upload-to-imgur@v2.2.2
        with:
          client_id: ${{ secrets.IMGUR_CLIENT_ID }}
          path: tests/ui/screenshots/preview-main.png

      - name: Upload Scrolled Screenshot
        id: imgur_scrolled
        uses: devicons/public-upload-to-imgur@v2.2.2
        with:
          client_id: ${{ secrets.IMGUR_CLIENT_ID }}
          path: tests/ui/screenshots/preview-scrolled.png

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const mainImg = JSON.parse(process.env.MAIN_IMG)[0];
            const scrolledImg = JSON.parse(process.env.SCROLLED_IMG)[0];
            
            let body = "### 🎨 Visual Preview (mdwow)\n\n";
            body += `#### Main View\n${mainImg}\n\n`;
            body += `#### Scrolled View (Mermaid, Tables, etc.)\n${scrolledImg}\n\n`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
        env:
          MAIN_IMG: ${{ steps.imgur_main.outputs.markdown_urls }}
          SCROLLED_IMG: ${{ steps.imgur_scrolled.outputs.markdown_urls }}
