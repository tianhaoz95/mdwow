name: Visual Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  visual-preview:
    name: Generate Visual Preview
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build mdwow
        run: npm run build

      - name: Install VHS and Dependencies
        run: |
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://repo.charm.sh/apt/gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" | sudo tee /etc/apt/sources.list.d/charm.list
          sudo apt-get update
          sudo apt-get install -y vhs ttyd ffmpeg

      - name: Create screenshots directory
        run: mkdir -p tests/ui/screenshots

      - name: Generate Screenshots with VHS
        run: vhs tests/ui/preview.tape
        env:
          FORCE_COLOR: 3

      - name: Upload Screenshots to 0x0.st
        id: upload
        run: |
          MAIN_URL=$(curl -F'file=@tests/ui/screenshots/preview-main.png' https://0x0.st)
          echo "main_url=$MAIN_URL" >> $GITHUB_OUTPUT
          
          SCROLLED_URL=$(curl -F'file=@tests/ui/screenshots/preview-scrolled.png' https://0x0.st)
          echo "scrolled_url=$SCROLLED_URL" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const mainImg = process.env.MAIN_URL;
            const scrolledImg = process.env.SCROLLED_URL;
            
            let body = "### 🎨 Visual Preview (mdwow)\n\n";
            body += `#### Main View\n![Main View](${mainImg})\n\n`;
            body += `#### Scrolled View (Mermaid, Tables, etc.)\n![Scrolled View](${scrolledImg})\n\n`;
            body += "\n---\n*Screenshots hosted temporarily on 0x0.st*";
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
        env:
          MAIN_URL: ${{ steps.upload.outputs.main_url }}
          SCROLLED_URL: ${{ steps.upload.outputs.scrolled_url }}
