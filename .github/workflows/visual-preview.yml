name: Visual Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  visual-preview:
    name: Generate Visual Preview
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build mdwow
        run: npm run build

      - name: Install VHS and Dependencies
        run: |
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://repo.charm.sh/apt/gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" | sudo tee /etc/apt/sources.list.d/charm.list
          sudo apt-get update
          sudo apt-get install -y vhs ttyd ffmpeg

      - name: Create screenshots directory
        run: mkdir -p tests/ui/screenshots

      - name: Generate Screenshots with VHS
        run: vhs tests/ui/preview.tape
        env:
          FORCE_COLOR: 3

      - name: Upload Screenshots to Imgur
        id: imgur
        run: |
          upload_image() {
            local path=$1
            for i in {1..3}; do
              echo "Uploading $path (attempt $i)..."
              RESPONSE=$(curl -s -X POST -H "Authorization: Client-ID ${{ secrets.IMGUR_CLIENT_ID }}" \
                -F "image=@$path" \
                https://api.imgur.com/3/upload)
              
              URL=$(echo $RESPONSE | jq -r '.data.link')
              if [ "$URL" != "null" ] && [ -n "$URL" ]; then
                echo "url=$URL"
                return 0
              fi
              echo "Upload failed: $RESPONSE"
              sleep 5
            done
            return 1
          }

          MAIN_URL=$(upload_image "tests/ui/screenshots/preview-main.png")
          echo "main_url=${MAIN_URL#url=}" >> $GITHUB_OUTPUT
          
          sleep 2 # Avoid rapid fire
          
          SCROLLED_URL=$(upload_image "tests/ui/screenshots/preview-scrolled.png")
          echo "scrolled_url=${SCROLLED_URL#url=}" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const mainImg = process.env.MAIN_URL;
            const scrolledImg = process.env.SCROLLED_URL;
            
            if (!mainImg || !scrolledImg) {
              console.log("One or more images failed to upload.");
              return;
            }

            let body = "### 🎨 Visual Preview (mdwow)\n\n";
            body += `#### Main View\n![Main View](${mainImg})\n\n`;
            body += `#### Scrolled View (Mermaid, Tables, etc.)\n![Scrolled View](${scrolledImg})\n\n`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
        env:
          MAIN_URL: ${{ steps.imgur.outputs.main_url }}
          SCROLLED_URL: ${{ steps.imgur.outputs.scrolled_url }}
