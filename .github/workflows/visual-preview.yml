name: Visual Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  visual-preview:
    name: Generate Visual Preview
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build mdwow
        run: npm run build

      - name: Verify Build
        run: ls -R dist/

      - name: Debug Environment
        run: |
          node -v
          npm -v
          ls -l TEST.md

      - name: Smoke Test App
        run: |
          timeout 5s node dist/cli.js TEST.md || true

      - name: Install VHS and Dependencies
        run: |
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://repo.charm.sh/apt/gpg.key | sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" | sudo tee /etc/apt/sources.list.d/charm.list
          sudo apt-get update
          sudo apt-get install -y vhs ttyd ffmpeg

      - name: Create screenshots directory
        run: mkdir -p tests/ui/screenshots

      - name: Generate Screenshots with VHS
        run: vhs tests/ui/preview.tape
        env:
          FORCE_COLOR: 3
          TERM: xterm-256color

      - name: Push GIF to Previews Branch
        id: host
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          RUN_ID="${{ github.run_id }}"
          PR_NUM="${{ github.event.pull_request.number }}"
          DIR="previews/pr-$PR_NUM/run-$RUN_ID"
          REPO="${{ github.repository }}"
          
          git clone --depth 1 --branch visual-previews https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/$REPO _previews || \
          (mkdir _previews && cd _previews && git init && git checkout -b visual-previews && git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/$REPO)
          
          mkdir -p _previews/$DIR
          cp tests/ui/screenshots/preview.gif _previews/$DIR/
          
          cd _previews
          git add .
          git commit -m "Upload animated preview for PR $PR_NUM (run $RUN_ID)"
          git push origin visual-previews
          
          BASE_URL="https://raw.githubusercontent.com/$REPO/visual-previews/$DIR"
          echo "gif_url=$BASE_URL/preview.gif" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const gifUrl = process.env.GIF_URL;
            let body = "### 🎬 Visual Preview (mdwow)\n\n";
            body += `![Animated Preview](${gifUrl})\n\n`;
            body += "\n---\n*Animated preview hosted on visual-previews branch*";
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
        env:
          GIF_URL: ${{ steps.host.outputs.gif_url }}
