name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Create release if version changed
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to create GitHub releases

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need previous commit to diff package.json

      - name: Check if version changed
        id: version
        run: |
          PREV=$(git show HEAD~1:package.json 2>/dev/null | node -pe "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null || echo "none")
          CURR=$(node -pe "require('./package.json').version")
          echo "previous=$PREV"
          echo "current=$CURR"
          echo "previous=$PREV" >> $GITHUB_OUTPUT
          echo "current=$CURR" >> $GITHUB_OUTPUT
          if [ "$PREV" != "$CURR" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: npm ci

      - name: Run tests
        if: steps.version.outputs.changed == 'true'
        run: npm test

      - name: Build
        if: steps.version.outputs.changed == 'true'
        run: npm run build

      - name: Create GitHub release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.current }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "Release v${VERSION}" \
            --latest

      # npm publish is handled by npm-publish.yml, which triggers on release creation above
