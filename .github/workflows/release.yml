name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Create release and publish if version changed
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: version
        run: |
          PREV=$(git show HEAD~1:package.json 2>/dev/null | jq -r '.version' 2>/dev/null || echo "none")
          CURR=$(jq -r '.version' package.json)
          echo "previous=$PREV"
          echo "current=$CURR"
          echo "previous=$PREV" >> $GITHUB_OUTPUT
          echo "current=$CURR" >> $GITHUB_OUTPUT
          if [ "$PREV" != "$CURR" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: npm ci

      - name: Run tests
        if: steps.version.outputs.changed == 'true'
        run: npm test

      - name: Build
        if: steps.version.outputs.changed == 'true'
        run: npm run build

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        # Skip prepublishOnly since we already tested and built above
        run: npm publish --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.current }}"
          # Skip if tag already exists (e.g. re-run of same commit)
          if gh release view "v${VERSION}" &>/dev/null; then
            echo "Release v${VERSION} already exists, skipping."
          else
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --notes "Release v${VERSION}" \
              --latest
          fi
