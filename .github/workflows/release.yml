name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write  # Required for OIDC provenance

jobs:
  release:
    name: Tag, release, and publish if version changed
    runs-on: ubuntu-latest
    environment: publish_npm

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: version
        run: |
          PREV=$(git show HEAD~1:package.json 2>/dev/null | jq -r '.version' 2>/dev/null || echo "none")
          CURR=$(jq -r '.version' package.json)
          echo "previous=$PREV"
          echo "current=$CURR"
          echo "previous=$PREV" >> $GITHUB_OUTPUT
          echo "current=$CURR" >> $GITHUB_OUTPUT
          if [ "$PREV" != "$CURR" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      # Use setup-node WITHOUT registry-url for install/test/build
      # so NODE_AUTH_TOKEN is not injected into these steps
      - name: Set up Node.js
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: npm ci

      - name: Run tests
        if: steps.version.outputs.changed == 'true'
        run: npm test

      - name: Build
        if: steps.version.outputs.changed == 'true'
        run: npm run build

      # Re-run setup-node WITH registry-url only for publish.
      # This writes .npmrc pointing to the registry. With id-token: write
      # and no NODE_AUTH_TOKEN, npm uses the GitHub OIDC token via
      # Trusted Publishers instead of a classic token.
      - name: Set up Node.js for publish
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm via OIDC
        if: steps.version.outputs.changed == 'true'
        run: |
          # Remove token from .npmrc so npm falls through to OIDC
          sed -i '/^\/\/registry.npmjs.org\/:_authToken/d' "${NPM_CONFIG_USERCONFIG}"
          # Unset NODE_AUTH_TOKEN env var — npm checks this directly and it
          # takes precedence over OIDC if set, even to an empty value
          unset NODE_AUTH_TOKEN
          npm publish --provenance --access public

      - name: Create git tag and GitHub release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.current }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "Release v${VERSION}" \
            --latest
