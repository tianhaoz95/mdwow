name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write  # Required for npm OIDC provenance

jobs:
  release:
    name: Tag, release, and publish if version changed
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: version
        run: |
          PREV=$(git show HEAD~1:package.json 2>/dev/null | jq -r '.version' 2>/dev/null || echo "none")
          CURR=$(jq -r '.version' package.json)
          echo "previous=$PREV"
          echo "current=$CURR"
          echo "previous=$PREV" >> $GITHUB_OUTPUT
          echo "current=$CURR" >> $GITHUB_OUTPUT
          if [ "$PREV" != "$CURR" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js
        if: steps.version.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.version.outputs.changed == 'true'
        run: npm ci

      - name: Run tests
        if: steps.version.outputs.changed == 'true'
        run: npm test

      - name: Build
        if: steps.version.outputs.changed == 'true'
        run: npm run build

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        run: |
          npm config set //registry.npmjs.org/:_authToken "${NPM_TOKEN}"
          npm publish --provenance --access public
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create git tag and GitHub release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.current }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "Release v${VERSION}" \
            --latest
